# ============================================================
# WORKFLOW: Deploy App ADI a GitHub Pages
# Se ejecuta automáticamente cada vez que se hace push a main
# ============================================================

name: Deploy static content to Pages

# ── DISPARADORES ──────────────────────────────────────────
on:
  push:
    branches: ["main"]        # Se activa al hacer push a main
  workflow_dispatch:           # También se puede ejecutar manualmente desde Actions

# ── PERMISOS ──────────────────────────────────────────────
# GitHub necesita estos permisos para poder publicar en Pages
permissions:
  contents: read               # Leer el código del repositorio
  pages: write                 # Escribir en GitHub Pages
  id-token: write              # Autenticación segura con GitHub

# ── CONCURRENCIA ──────────────────────────────────────────
# Evita que dos deploys corran al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: false    # No cancela el deploy en curso si llega uno nuevo

# ── JOBS (TAREAS) ─────────────────────────────────────────
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # URL final de la app
    runs-on: ubuntu-latest     # Corre en una máquina virtual Linux

    steps:

      # 1. Descarga el código del repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instala Node.js versión 20 con caché de npm
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Crea el archivo .env.local con las credenciales de Google
      #    Los valores vienen de los Secrets configurados en GitHub
      #    (Settings → Secrets and variables → Actions)
      - name: Create env file
        run: |
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env.local
          echo "VITE_GOOGLE_API_KEY=${{ secrets.VITE_GOOGLE_API_KEY }}" >> .env.local

      # 4. Instala todas las dependencias del proyecto (node_modules)
      - name: Install dependencies
        run: npm install

      # 5. Compila la app para producción → genera la carpeta /dist
      - name: Build
        run: npm run build

      # 6. Configura GitHub Pages para recibir el deploy
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 7. Sube la carpeta /dist como artefacto para Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 8. Publica el artefacto en GitHub Pages
      #    El id "deployment" permite obtener la URL final en el paso de environment
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4